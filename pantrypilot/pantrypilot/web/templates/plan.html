<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PantryPilot — Swiggy Instamart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .nfi-bar { transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
    .fade-in { animation: fadeIn 0.35s ease both; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0);   }
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

<!-- ── Header ─────────────────────────────────────────────────────────── -->
<header class="bg-white border-b border-slate-100 sticky top-0 z-10 shadow-sm">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 h-14 flex items-center gap-3">
    <span class="text-xl">🧺</span>
    <span class="font-bold text-slate-900 tracking-tight text-base">PantryPilot</span>
    <span class="text-slate-200 text-sm">·</span>
    <span class="text-[#FC8019] font-semibold text-sm">Swiggy Instamart</span>
    <span class="ml-auto flex items-center gap-4">
      <span class="text-xs text-slate-400 hidden sm:block">Health-aware weekly grocery planning</span>
      <a href="/household/new"
         class="text-xs text-slate-500 hover:text-[#FC8019] transition border border-slate-200 hover:border-orange-200 px-3 py-1.5 rounded-lg">
        ← New household
      </a>
    </span>
  </div>
</header>

<!-- ── Main ───────────────────────────────────────────────────────────── -->
<main class="max-w-5xl mx-auto px-4 sm:px-6 py-8 space-y-5">

  <!-- Household card (auto-loaded) -->
  <div id="household-card" class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
    <p class="text-slate-400 text-sm animate-pulse">Loading household…</p>
  </div>

  <!-- Catalogue bar (shown once household is ready) -->
  <div id="catalogue-card" class="hidden bg-white rounded-2xl border border-slate-100 shadow-sm p-5 fade-in"></div>

  <!-- Optimise CTA -->
  <div id="cta-section" class="hidden fade-in">
    <button id="optimise-btn" onclick="runOptimiser()"
      class="w-full bg-[#FC8019] hover:bg-[#e5711a] active:scale-[0.99] text-white
             font-semibold text-base py-4 rounded-2xl shadow-md transition-all duration-150">
      🛒&nbsp; Plan This Week's Grocery Order
    </button>
  </div>

  <!-- Basket + NFI result -->
  <div id="result-section" class="hidden"></div>

  <!-- Confirm / Cancel -->
  <div id="confirm-section" class="hidden"></div>

  <!-- Order outcome -->
  <div id="order-result" class="hidden"></div>

</main>

<script>
// ── State ───────────────────────────────────────────────────────────────────
const HOUSEHOLD_ID = "{{ household_id }}";
let sessionId = null;

// ── Boot ────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  const [hh, cat] = await Promise.all([
    apiFetch('/api/household/' + HOUSEHOLD_ID),
    apiFetch('/api/catalogue?household_id=' + HOUSEHOLD_ID),
  ]);
  renderHousehold(hh);
  renderCatalogue(cat, hh.pincode);
  show('cta-section');
});

// ── API helpers ─────────────────────────────────────────────────────────────
async function apiFetch(url) {
  return fetch(url).then(r => r.json());
}
async function apiPost(url, body) {
  return fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  }).then(r => r.json());
}

// ── DOM helpers ─────────────────────────────────────────────────────────────
function show(id)          { document.getElementById(id).classList.remove('hidden'); }
function hide(id)          { document.getElementById(id).classList.add('hidden'); }
function setHtml(id, html) { document.getElementById(id).innerHTML = html; }

// ── Style tables ────────────────────────────────────────────────────────────
const DIET_CLS = {
  vegetarian:  'bg-green-100 text-green-700',
  jain:        'bg-amber-100 text-amber-800',
  vegan:       'bg-emerald-100 text-emerald-700',
  eggetarian:  'bg-lime-100 text-lime-700',
  non_veg:     'bg-red-100 text-red-700',
};
const ALLERGY_CLS = {
  lactose: 'bg-sky-100 text-sky-700',
  nuts:    'bg-orange-100 text-orange-700',
  gluten:  'bg-rose-100 text-rose-700',
  soy:     'bg-purple-100 text-purple-700',
};
const BRAND_CLS = [
  'bg-orange-100 text-orange-600',
  'bg-sky-100    text-sky-600',
  'bg-violet-100 text-violet-600',
  'bg-teal-100   text-teal-600',
  'bg-rose-100   text-rose-600',
  'bg-green-100  text-green-600',
];

function pill(text, cls) {
  return `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ${cls}">${text}</span>`;
}

// ── Render: household ────────────────────────────────────────────────────────
function renderHousehold(hh) {
  const memberCards = hh.members.map(m => {
    const diets    = m.dietary_patterns.map(d => pill(d, DIET_CLS[d] || 'bg-slate-100 text-slate-600')).join('');
    const allergies = m.allergies.map(a => pill('⚠ ' + a, ALLERGY_CLS[a] || 'bg-red-100 text-red-600')).join('');
    return `
      <div class="bg-slate-50 rounded-xl p-3.5">
        <div class="font-semibold text-slate-800 text-sm leading-tight">${m.name.split(' ')[0]}</div>
        <div class="text-xs text-slate-400 mt-0.5 mb-2">${m.age} yrs</div>
        <div class="flex flex-wrap gap-1">${diets}${allergies}</div>
      </div>`;
  }).join('');

  setHtml('household-card', `
    <div class="flex items-start justify-between gap-4 mb-5">
      <div>
        <h2 class="font-bold text-slate-900 text-lg">${hh.name}</h2>
        <div class="flex flex-wrap items-center gap-x-4 gap-y-1 mt-1.5 text-sm text-slate-500">
          <span>₹${hh.weekly_budget_inr.toLocaleString()} / week</span>
          <span>📍 ${hh.pincode}</span>
          <span>${hh.members.length} members</span>
        </div>
      </div>
      <span class="flex-shrink-0 text-xs bg-orange-50 text-[#FC8019] border border-orange-100 px-3 py-1 rounded-full font-medium">
        ${hh.powered_by}
      </span>
    </div>
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">${memberCards}</div>
  `);
}

// ── Render: catalogue bar ────────────────────────────────────────────────────
function renderCatalogue(cat, pincode) {
  const pct = Math.round((cat.compatible_skus / cat.total_skus) * 100);
  setHtml('catalogue-card', `
    <div class="flex items-center justify-between mb-3">
      <span class="text-sm font-semibold text-slate-700">Instamart Catalogue — ${pincode}</span>
      <span class="text-xs text-slate-400">${cat.total_skus} SKUs total</span>
    </div>
    <div class="flex items-center gap-3 mb-3">
      <div class="flex-1 bg-slate-100 rounded-full h-2.5 overflow-hidden">
        <div class="bg-green-400 h-2.5 rounded-full transition-all duration-700" style="width:${pct}%"></div>
      </div>
      <span class="text-sm font-bold text-green-600 w-8">${pct}%</span>
    </div>
    <div class="flex flex-wrap gap-4 text-xs">
      <span class="text-green-600 font-medium">✓ ${cat.compatible_skus} pass dietary filter</span>
      <span class="text-red-400">✗ ${cat.filtered_out} filtered out (dairy · onion/garlic · peanuts)</span>
    </div>
  `);
  show('catalogue-card');
}

// ── Optimise ─────────────────────────────────────────────────────────────────
async function runOptimiser() {
  const btn = document.getElementById('optimise-btn');
  btn.disabled = true;
  btn.innerHTML = `
    <span class="inline-flex items-center justify-center gap-2">
      <span class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
      Building your basket…
    </span>`;

  hide('result-section'); hide('confirm-section'); hide('order-result');
  setHtml('result-section', ''); setHtml('confirm-section', ''); setHtml('order-result', '');

  const cycle = await apiPost('/api/cycle', { household_id: HOUSEHOLD_ID });
  sessionId = cycle.session_id;

  renderBasket(cycle);
  renderConfirmBar(cycle);

  show('result-section');
  show('confirm-section');

  btn.innerHTML = '↺&nbsp; Rebuild Basket';
  btn.disabled = false;
}

// ── Render: basket + NFI ──────────────────────────────────────────────────────
function fmtSize(g) {
  if (g >= 1000) {
    const kg = g / 1000;
    return (kg === Math.floor(kg)) ? `${kg}kg` : `${kg.toFixed(1)}kg`;
  }
  return `${g}g`;
}

function nfiBarCls(pct) {
  if (pct >= 99) return 'bg-green-500';
  if (pct >= 80) return 'bg-green-400';
  if (pct >= 50) return 'bg-amber-400';
  return 'bg-red-400';
}

function negBarCls(pct) {
  if (pct <= 70) return 'bg-green-400';
  if (pct <= 90) return 'bg-amber-400';
  return 'bg-red-500';
}

function extCell(label, pct) {
  const isGap = pct === null || pct === undefined;
  const val = isGap ? '<span class="text-slate-300 text-xs">? data gap</span>'
    : `<span class="text-xs font-semibold ${pct >= 80 ? 'text-green-600' : pct >= 50 ? 'text-amber-600' : 'text-red-500'}">${pct.toFixed(0)}%</span>`;
  return `
    <div class="bg-slate-50 rounded-xl p-3">
      <div class="text-xs text-slate-400 mb-1">${label}</div>
      ${val}
      ${!isGap ? `<div class="mt-1.5 bg-slate-200 rounded-full h-1 overflow-hidden">
        <div class="h-1 rounded-full ${nfiBarCls(pct)} nfi-bar" style="width:0%" data-target="${Math.min(pct,100).toFixed(1)}"></div>
      </div>` : ''}
    </div>`;
}

function renderBasket(cycle) {
  const nfi = cycle.nfi;
  const neg = cycle.negatives;
  const ceil = cycle.neg_ceilings;

  const nfiRows = [
    ['Calories', nfi.calories_pct],
    ['Protein',  nfi.protein_pct],
    ['Fibre',    nfi.fibre_pct],
    ['Iron',     nfi.iron_pct],
    ['Calcium',  nfi.calcium_pct],
  ];

  const nfiHtml = nfiRows.map(([label, pct]) => {
    const isBinding = label.toLowerCase() === cycle.binding_nutrient && nfi.overall_pct < 100;
    const valCls = isBinding ? 'text-amber-600 font-bold' : 'text-slate-600 font-semibold';
    return `
      <div class="flex items-center gap-3">
        <span class="w-16 text-xs text-slate-500">${label}</span>
        <div class="flex-1 bg-slate-100 rounded-full h-2 overflow-hidden">
          <div class="nfi-bar h-2 rounded-full ${nfiBarCls(pct)}"
               style="width:0%" data-target="${Math.min(pct, 100).toFixed(1)}"></div>
        </div>
        <span class="w-14 text-right text-xs ${valCls}">
          ${pct.toFixed(0)}%${isBinding ? ' ←' : ''}
        </span>
      </div>`;
  }).join('');

  const overallCls = nfi.overall_pct >= 99
    ? 'text-green-600'
    : nfi.overall_pct >= 80 ? 'text-amber-600' : 'text-red-500';

  const basketLines = cycle.basket.map((line, i) => {
    const isTopup = cycle.pantry_topup.includes(line.sku_id);
    const topupBadge = isTopup
      ? `<span class="text-xs bg-sky-50 text-sky-600 border border-sky-100 px-1.5 py-0.5 rounded-md leading-none">↑ low stock</span>`
      : '';
    const avatar = `<div class="w-9 h-9 rounded-xl flex items-center justify-center font-bold text-sm flex-shrink-0 ${BRAND_CLS[i % BRAND_CLS.length]}">${line.brand[0]}</div>`;
    return `
      <div class="flex items-start gap-3 py-3 border-b border-slate-50 last:border-0">
        ${avatar}
        <div class="flex-1 min-w-0">
          <div class="flex items-center flex-wrap gap-1.5 mb-0.5">
            <span class="font-medium text-slate-800 text-sm leading-snug">${line.name}</span>
            ${topupBadge}
          </div>
          <div class="text-xs text-slate-400">
            ${line.quantity} × ${fmtSize(line.pack_size_g)} · ${line.brand}
          </div>
          <div class="text-xs text-slate-400 mt-0.5 italic">${line.reason}</div>
        </div>
        <div class="text-sm font-bold text-slate-800 flex-shrink-0 pt-0.5">
          ₹${Math.round(line.total_price_inr)}
        </div>
      </div>`;
  }).join('');

  const budgetPct = Math.round((cycle.budget_used_inr / cycle.budget_total_inr) * 100);

  const footerChips = [
    `⚡ ${cycle.solve_time_ms.toFixed(1)} ms`,
    `${cycle.skus_filtered_out} SKUs filtered`,
    cycle.overstocked_skipped.length
      ? `${cycle.overstocked_skipped.length} skipped (well-stocked)` : null,
    nfi.contains_estimated ? '~ estimated nutrition' : null,
  ].filter(Boolean).map(t => `<span>${t}</span>`).join('');

  // Extended nutrients grid
  const extHtml = [
    ['Zinc',       nfi.zinc_pct],
    ['Magnesium',  nfi.magnesium_pct],
    ['Potassium',  nfi.potassium_pct],
    ['Vitamin A',  nfi.vitamin_a_pct],
    ['Vitamin C',  nfi.vitamin_c_pct],
    ['Folate',     nfi.folate_pct],
    ['Vitamin B12',nfi.vitamin_b12_pct],
  ].map(([l, p]) => extCell(l, p)).join('');

  // Negative nutrients bars
  function negRow(label, val, ceiling, unit, decimals=0) {
    const pct = Math.min((val / ceiling) * 100, 100);
    const display = decimals ? val.toFixed(decimals) : Math.round(val);
    const ceilDisplay = decimals ? ceiling.toFixed(decimals) : Math.round(ceiling);
    return `
      <div>
        <div class="flex justify-between text-xs mb-1">
          <span class="text-slate-600 font-medium">${label}</span>
          <span class="${pct > 90 ? 'text-red-500 font-bold' : 'text-slate-500'}">${display} / ${ceilDisplay} ${unit}</span>
        </div>
        <div class="bg-slate-100 rounded-full h-2 overflow-hidden">
          <div class="h-2 rounded-full ${negBarCls(pct)} transition-all duration-700" style="width:${pct.toFixed(1)}%"></div>
        </div>
      </div>`;
  }

  const negHtml = `
    ${negRow('Sodium', neg.sodium_mg, ceil.sodium_mg, 'mg')}
    ${negRow('Saturated fat', neg.saturated_fat_g, ceil.saturated_fat_g, 'g', 1)}
    ${negRow('Added sugar', neg.added_sugar_g, ceil.added_sugar_g, 'g', 1)}
    ${neg.ultra_processed_count > 0
      ? `<div class="text-xs text-amber-600 mt-2">⚠ ${neg.ultra_processed_count} ultra-processed item${neg.ultra_processed_count > 1 ? 's' : ''} in basket</div>`
      : `<div class="text-xs text-green-600 mt-2">✓ No ultra-processed items</div>`}
  `;

  setHtml('result-section', `
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-5 fade-in">

      <!-- Basket -->
      <div class="lg:col-span-2 bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
        <div class="flex items-center justify-between mb-1">
          <h3 class="font-bold text-slate-900">This Week's Basket</h3>
          <div class="text-right">
            <span class="text-sm font-bold text-slate-800">₹${Math.round(cycle.budget_used_inr)}</span>
            <span class="text-xs text-slate-400"> / ₹${Math.round(cycle.budget_total_inr)}</span>
          </div>
        </div>
        <div class="w-full bg-slate-100 rounded-full h-1 mb-5 overflow-hidden">
          <div class="bg-[#FC8019] h-1 rounded-full" style="width:${budgetPct}%"></div>
        </div>
        <div>${basketLines}</div>
        <div class="mt-4 pt-3 border-t border-slate-100 flex flex-wrap gap-3 text-xs text-slate-400">
          ${footerChips}
        </div>
      </div>

      <!-- NFI panel -->
      <div class="flex flex-col gap-5">

        <!-- Core 5 NFI -->
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 flex flex-col">
          <h3 class="font-bold text-slate-900 mb-0.5">Core 5 nutrients</h3>
          <p class="text-xs text-slate-400 mb-5">weekly target coverage</p>
          <div class="space-y-3.5 flex-1">${nfiHtml}</div>
          <div class="mt-6 pt-5 border-t border-slate-100 text-center">
            <div class="text-5xl font-black ${overallCls} leading-none">${nfi.overall_pct.toFixed(0)}%</div>
            <div class="text-xs text-slate-400 mt-2">overall NFI</div>
            <div class="text-xs text-slate-400 mt-0.5">
              ${nfi.overall_pct >= 99 ? '✓ full weekly coverage' : 'binding: ' + cycle.binding_nutrient}
            </div>
          </div>
        </div>

        <!-- Extended nutrients -->
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
          <h3 class="font-bold text-slate-900 text-sm mb-3">Extended nutrients</h3>
          <div class="grid grid-cols-2 gap-2">${extHtml}</div>
        </div>

        <!-- Negative nutrients -->
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
          <h3 class="font-bold text-slate-900 text-sm mb-3">Watch — limit these</h3>
          <div class="space-y-3">${negHtml}</div>
        </div>

      </div>
    </div>
  `);

  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.querySelectorAll('.nfi-bar[data-target]').forEach(el => {
      el.style.width = el.dataset.target + '%';
    });
  }));
}

// ── Render: confirm bar ───────────────────────────────────────────────────────
function renderConfirmBar(cycle) {
  const d        = new Date(cycle.confirm_before);
  const timeStr  = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const dateStr  = d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });

  setHtml('confirm-section', `
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 fade-in">
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
        <div>
          <h3 class="font-bold text-slate-900">Ready to place this order?</h3>
          <p class="text-sm text-slate-500 mt-0.5">
            Confirm before <strong>${timeStr}</strong> on ${dateStr}
            &nbsp;·&nbsp; one-tap cancel, no surprises
          </p>
        </div>
        <div class="flex gap-3 flex-shrink-0">
          <button onclick="doConfirm('cancel')"
            class="px-5 py-2.5 rounded-xl border border-slate-200 text-slate-600 text-sm
                   font-medium hover:bg-slate-50 transition">
            Cancel
          </button>
          <button onclick="doConfirm('confirm')"
            class="px-5 py-2.5 rounded-xl bg-[#FC8019] hover:bg-[#e5711a] text-white text-sm
                   font-semibold shadow transition">
            ✓&nbsp; Confirm order
          </button>
        </div>
      </div>
    </div>
  `);
}

// ── Confirm / Cancel ──────────────────────────────────────────────────────────
async function doConfirm(action) {
  if (!sessionId) return;
  const sid = sessionId;
  sessionId = null;
  hide('confirm-section');

  const result = await apiPost(`/api/cycle/${sid}/confirm`, { action });

  if (action === 'confirm') {
    setHtml('order-result', `
      <div class="bg-green-50 border border-green-100 rounded-2xl p-8 text-center fade-in">
        <div class="text-4xl mb-3">✅</div>
        <h3 class="font-bold text-green-800 text-lg">Order Placed</h3>
        <p class="text-sm text-green-700 mt-2 font-mono tracking-tight">${result.order_id}</p>
        <p class="text-xs text-green-600 mt-4">
          Powered by ${result.powered_by} · Pantry will be updated on delivery
        </p>
      </div>
    `);
  } else {
    setHtml('order-result', `
      <div class="bg-slate-50 border border-slate-100 rounded-2xl p-8 text-center fade-in">
        <div class="text-4xl mb-3">↩</div>
        <h3 class="font-bold text-slate-700 text-lg">Order Cancelled</h3>
        <p class="text-sm text-slate-500 mt-2">
          No charge. Run the optimiser again whenever you're ready.
        </p>
      </div>
    `);
  }
  show('order-result');
}
</script>

</body>
</html>
